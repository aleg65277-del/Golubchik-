<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Golubchik DM</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/socket.io/socket.io.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0b1020;color:white;}
.app{display:flex;height:100vh;}

.left{
width:260px;
background:#111a2e;
padding:10px;
}

.user{
padding:8px;
margin:4px 0;
background:#1b2a4a;
border-radius:6px;
cursor:pointer;
}

.chat{
flex:1;
display:flex;
flex-direction:column;
}

.top{
padding:10px;
background:#111a2e;
}

.messages{
flex:1;
padding:10px;
overflow:auto;
}

.msg{
background:#1b2a4a;
padding:8px;
border-radius:8px;
margin:5px 0;
}
</style>
</head>

<body>

<div class="app">

<div class="left">
<h3>🕊 Users</h3>
<div id="users"></div>
</div>

<div class="chat">

<div class="top" id="title">Личные сообщения</div>

<div class="messages" id="msgs"></div>

<div style="display:flex;padding:10px;">
<input id="msg" placeholder="Сообщение">
<button onclick="send()">➤</button>
</div>

</div>

</div>

<script>
const socket = io();

let myName = prompt("Введите имя");
let selectedSocket = null;

socket.emit("join",{user:myName});

socket.on("users", list=>{
users.innerHTML="";

list.forEach(u=>{
let div=document.createElement("div");
div.className="user";
div.innerText=u;

div.onclick=()=>{
selectedSocket = u;
title.innerText = "Чат с " + u;
};

users.appendChild(div);
});
});

function send(){
if(!msg.value || !selectedSocket) return;

socket.emit("private_message",{
from:myName,
toSocket:selectedSocket,
text:msg.value
});

let div=document.createElement("div");
div.className="msg";
div.innerText="Я: " + msg.value;
msgs.appendChild(div);

msg.value="";
}

socket.on("private_message",data=>{
let div=document.createElement("div");
div.className="msg";
div.innerText=data.from + ": " + data.text;
msgs.appendChild(div);
});
</script>

</body>
</html>
