<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Golubchik PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/socket.io/socket.io.js"></script>

<style>
body{margin:0;font-family:sans-serif;background:#0b1020;color:white;}
.app{display:flex;height:100vh;}

.left{
width:260px;
background:#111a2e;
padding:10px;
}

.chat{
flex:1;
display:flex;
flex-direction:column;
}

.messages{
flex:1;
overflow:auto;
padding:10px;
}

.msg{
background:#1b2a4a;
padding:8px;
border-radius:8px;
margin:5px 0;
}

.me{background:#2ea6ff;}

img,video{
max-width:200px;
border-radius:8px;
display:block;
margin-top:5px;
}

</style>
</head>

<body>

<div class="app">

<div class="left">
<h2>🕊 Golubchik</h2>

<input id="name" placeholder="Ник">
<button onclick="login()">Войти</button>

<hr>

<h4>🟢 Онлайн</h4>
<div id="users"></div>
</div>

<div class="chat">

<div class="messages" id="msgs"></div>

<div style="display:flex;padding:10px;gap:5px;">
<input id="msg" placeholder="Сообщение">
<input type="file" id="file">
<button onclick="send()">➤</button>
</div>

</div>

</div>

<script>
const socket = io();
let myName="";

function login(){
myName = name.value || "Гость";
socket.emit("join", myName);
}

function send(){
if(!msg.value && !file.files[0]) return;

let reader = new FileReader();

if(file.files[0]){
  reader.onload = function(e){
    socket.emit("message",{
      user: myName,
      text: msg.value,
      file: e.target.result
    });
  };
  reader.readAsDataURL(file.files[0]);
}else{
  socket.emit("message",{
    user: myName,
    text: msg.value
  });
}

msg.value="";
file.value="";
}

socket.on("message",data=>{
let div=document.createElement("div");
div.className="msg";

if(data.user === myName) div.classList.add("me");

div.innerHTML = "<b>"+data.user+"</b><br>"+(data.text||"");

if(data.file){
  if(data.file.startsWith("data:video")){
    div.innerHTML += `<video src="${data.file}" controls></video>`;
  }else{
    div.innerHTML += `<img src="${data.file}">`;
  }
}

msgs.appendChild(div);
msgs.scrollTop=msgs.scrollHeight;
});

socket.on("users",list=>{
users.innerHTML = list.map(u=>"🟢 "+u).join("<br>");
});
</script>

</body>
</html>
